services:

  # ============================================================================
  # POSTGRESQL
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: de-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      PGDATA:            /var/lib/postgresql/data/pgdata
    # ── Tuning nhẹ cho môi trường dev ──
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 15s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - de-network

  # ============================================================================
  # PGADMIN  (chỉ bật khi cần: docker compose --profile tools up pgadmin)
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: de-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:              ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:           ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:         "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - de-network
    profiles: [tools]

  # ============================================================================
  # MINIO
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: de-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_UI_PORT}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test:          ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval:      45s
      timeout:       10s
      retries:       3
      start_period:  40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - de-network

  # ── MinIO bucket init (exit sau khi xong) ───────────────────────────────────
  minio-client:
    image: minio/mc:latest
    container_name: de-minio-client
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set m http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb m/rideflow              --ignore-existing;
      mc mb m/rideflow-checkpoints  --ignore-existing;
      mc mb m/spark-events          --ignore-existing;
      echo '' | mc pipe m/rideflow/bronze/.keep 2>/dev/null || true;
      echo '' | mc pipe m/rideflow/silver/.keep 2>/dev/null || true;
      echo '' | mc pipe m/rideflow/gold/.keep   2>/dev/null || true;
      mc anonymous set download m/rideflow;
      echo 'MinIO ready'; mc ls m;
      "
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
    networks:
      - de-network

  # ============================================================================
  # SPARK MASTER  (build trước qua make build-spark)
  # ============================================================================
  spark-master:
    build:
      context:    ./infrastructure/spark
      dockerfile: Dockerfile
    image: de-spark:3.5.1
    container_name: de-spark-master
    hostname:  spark-master
    restart:   unless-stopped
    command:   /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_UI_PORT}:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=${SPARK_MASTER_PORT}
      - SPARK_MASTER_WEBUI_PORT=${SPARK_MASTER_UI_PORT}
      - SPARK_PUBLIC_DNS=localhost
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipelines:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./shared:/opt/shared
      - spark_events:/opt/spark-events
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8080"]
      interval:     30s
      timeout:      10s
      retries:      10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    networks:
      de-network:
        aliases: [spark-master]

  spark-worker-1:
    build:
      context:    ./infrastructure/spark
      dockerfile: Dockerfile
    image: de-spark:3.5.1
    container_name: de-spark-worker-1
    hostname:  spark-worker-1
    restart:   unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    command:   /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "${SPARK_WORKER1_UI_PORT}:8081"
    environment:
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_WEBUI_PORT=${SPARK_WORKER1_UI_PORT}
      - SPARK_PUBLIC_DNS=localhost
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipelines:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./shared:/opt/shared
      - spark_events:/opt/spark-events
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
    networks:
      de-network:
        aliases: [spark-worker-1]

  spark-worker-2:
    build:
      context:    ./infrastructure/spark
      dockerfile: Dockerfile
    image: de-spark:3.5.1
    container_name: de-spark-worker-2
    hostname:  spark-worker-2
    restart:   unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    command:   /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "${SPARK_WORKER2_UI_PORT}:8082"
    environment:
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_WEBUI_PORT=${SPARK_WORKER2_UI_PORT}
      - SPARK_PUBLIC_DNS=localhost
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipelines:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./shared:/opt/shared
      - spark_events:/opt/spark-events
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
    networks:
      de-network:
        aliases: [spark-worker-2]

  # ── Spark History (chỉ khi cần: docker compose --profile monitoring up) ─────
  spark-history:
    build:
      context:    ./infrastructure/spark
      dockerfile: Dockerfile
    image: de-spark:3.5.1
    container_name: de-spark-history
    hostname:  spark-history
    restart:   unless-stopped
    command:   /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    ports:
      - "${SPARK_HISTORY_PORT}:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark-events
    volumes:
      - spark_events:/opt/spark-events
    depends_on:
      spark-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    networks:
      de-network:
        aliases: [spark-history]
    profiles: [monitoring]

  # ============================================================================
  # JUPYTER  (build trước qua make build-jupyter)
  # ============================================================================
  jupyter-spark:
    build:
      context:    ./infrastructure/jupyter
      dockerfile: Dockerfile
    image: de-jupyter-pyspark:latest
    container_name: de-jupyter-spark
    hostname:  jupyter-spark
    restart:   unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${JUPYTER_PORT}:8888"
      - "${SPARK_UI_PORT}:4040"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - PYSPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
      - SPARK_PUBLIC_DNS=localhost
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_ENDPOINT_URL=http://minio:9000
    volumes:
      - ./notebooks:/opt/spark-notebooks
      - ./pipelines:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./dbt:/opt/dbt
      - ./shared:/opt/shared
      - spark_events:/opt/spark-events
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval:     60s
      timeout:      15s
      retries:      5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    networks:
      de-network:
        aliases: [jupyter-spark]

  # ============================================================================
  # AIRFLOW  (build trước qua make build-airflow)
  # ============================================================================
  airflow-init:
    build:
      context:    ./infrastructure/airflow
      dockerfile: Dockerfile
    image: de-airflow:2.11.2
    container_name: de-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_USER}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_PASSWORD}
      # Env vars dùng trong airflow-init.sh
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipelines/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./scripts/airflow-init.sh:/scripts/airflow-init.sh:ro
      - airflow_logs:/opt/airflow/logs
    entrypoint: ["/bin/bash", "/scripts/airflow-init.sh"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    networks:
      - de-network

  airflow-webserver:
    image: de-airflow:2.11.2
    container_name: de-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      # ── Performance tuning ──
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__WORKER_TIMEOUT=120
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "${AIRFLOW_PORT}:8080"
    volumes:
      - ./pipelines/dags:/opt/airflow/dags
      - ./pipelines/bronze:/opt/airflow/bronze
      - ./pipelines/silver:/opt/airflow/silver
      - ./data:/opt/airflow/data
      - ./shared:/opt/shared
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock  # BashOperator → docker exec
    command: webserver
    healthcheck:
      test:         ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval:     60s
      timeout:      15s
      retries:      5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 384M
    networks:
      de-network:
        aliases: [airflow-webserver]

  airflow-scheduler:
    image: de-airflow:2.11.2
    container_name: de-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL=30
      # ── Performance tuning ──
      - AIRFLOW__SCHEDULER__PARSING_PROCESSES=1
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=2
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipelines/dags:/opt/airflow/dags
      - ./pipelines/bronze:/opt/airflow/bronze
      - ./pipelines/silver:/opt/airflow/silver
      - ./data:/opt/airflow/data
      - ./shared:/opt/shared
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock  # BashOperator → docker exec
    command: scheduler
    healthcheck:
      test:         ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval:     60s
      timeout:      15s
      retries:      5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 384M
    networks:
      de-network:
        aliases: [airflow-scheduler]

  # ============================================================================
  # METABASE
  # ============================================================================
  metabase:
    image: metabase/metabase:v0.49.4
    container_name: de-metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${METABASE_PORT}:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=${POSTGRES_PORT}
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
      - MB_DB_HOST=postgres
      - JAVA_TIMEZONE=Asia/Ho_Chi_Minh
      # ── JVM tuning: giới hạn heap để tiết kiệm RAM ──
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval:     60s
      timeout:      15s
      retries:      10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 512M
    networks:
      de-network:
        aliases: [metabase]

  # ============================================================================
  # KAFKA stack  (chỉ khi cần: docker compose --profile streaming up)
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: de-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    networks:
      - de-network
    profiles: [streaming]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: de-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              24
    ports:
      - "${KAFKA_EXTERNAL_PORT}:29092"
      - "${KAFKA_INTERNAL_PORT}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    networks:
      - de-network
    profiles: [streaming]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: de-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             rideflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER:        zookeeper:2181
    ports:
      - "${KAFKA_UI_PORT}:8080"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - de-network
    profiles: [streaming]

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  postgres_data:   { driver: local, name: rideflow_postgres_data }
  pgadmin_data:    { driver: local, name: rideflow_pgadmin_data }
  minio_data:      { driver: local, name: rideflow_minio_data }
  spark_events:    { driver: local, name: rideflow_spark_events }
  airflow_logs:    { driver: local, name: rideflow_airflow_logs }
  metabase_data:   { driver: local, name: rideflow_metabase_data }
  zookeeper_data:  { driver: local, name: rideflow_zookeeper_data }
  zookeeper_logs:  { driver: local, name: rideflow_zookeeper_logs }
  kafka_data:      { driver: local, name: rideflow_kafka_data }

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  de-network:
    driver: bridge
    name:   de_network
